services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    environment:
      - DATABASE_URL=sqlite:///./backend/data.db
      - JWT_SECRET=telescrape_super_secret_key_123
      - SIMULATION_MODE=true
      - TG_API_ID=${TG_API_ID:-}
      - TG_API_HASH=${TG_API_HASH:-}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
